<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍼 智慧復健水瓶 3D 角度與肌電雙模態監測系統</title>
    <!-- 引入原本網頁可能使用的 FontAwesome 圖標與 Chart.js 圖表庫 -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #38bdf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #f43f5e;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-dark);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
        }
        h1 {
            font-size: 26px;
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-sub);
            margin-bottom: 25px;
            font-size: 14px;
        }
        /* 控制連線區塊 */
        .control-panel {
            display: flex;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        button {
            flex: 1;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-serial { background: #0284c7; color: white; }
        .btn-serial:hover { background: #0369a1; }
        .btn-simulate { background: #475569; color: white; }
        .btn-simulate:hover { background: #334155; }
        .btn-disconnect { background: var(--danger); color: white; }

        /* 主要儀表板佈局 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        .card {
            background: #111827;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .card-title {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .angle-large {
            font-size: 56px;
            font-weight: bold;
            color: var(--danger);
            text-align: center;
            margin: 15px 0;
            font-family: monospace;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 15px;
            color: #cbd5e1;
        }

        /* 🔄 3D 姿態模擬視覺化區塊 */
        .preview-box {
            height: 200px;
            background: #030712;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px dashed #4b5563;
        }
        .bottle-container {
            perspective: 400px;
        }
        .bottle-3d {
            width: 50px;
            height: 110px;
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            border-radius: 10px 10px 6px 6px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.05s linear;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }
        .bottle-3d::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 15px;
            width: 20px;
            height: 12px;
            background: #0c4a6e;
            border-radius: 3px 3px 0 0;
        }
        .direction-tag {
            position: absolute;
            bottom: 8px;
            font-size: 12px;
            color: #4b5563;
        }

        /* 💪 EMG 肌電能量條 */
        .emg-section {
            margin-top: 15px;
        }
        .progress-bg {
            width: 100%;
            background: #334155;
            height: 30px;
            border-radius: 999px;
            overflow: hidden;
            position: relative;
            border: 1px solid #4b5563;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--success), #34d399);
            transition: width 0.08s ease-out;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }
        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 4px;
            font-weight: bold;
            font-size: 14px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        /* 🎉 智能診斷狀態欄 */
        .status-banner {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            background: #334155;
            color: #cbd5e1;
            margin-bottom: 25px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .status-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border-color: var(--success);
        }
        .status-warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border-color: var(--warning);
        }
        .status-info {
            background: rgba(56, 189, 248, 0.15);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* 📊 即時趨勢圖表區塊 */
        .chart-toggle-btn {
            width: 100%;
            background: #334155;
            color: #cbd5e1;
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .chart-container {
            background: #111827;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            display: block; /* 預設展開 */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍼 智慧復健水瓶 3D 角度與肌電監測系統</h1>
    <div class="subtitle">結合精準關節活動度 (ROM) 與 Grove-EMG 表面肌電信號反代償系統</div>

    <!-- 頂部控制面板 -->
    <div class="control-panel">
        <button class="btn-serial" id="connectBtn" onclick="connectHardware()">
            <i class="fa-solid fa-plug"></i> 讀取實體硬體 (Web Serial)
        </button>
        <button class="btn-disconnect" id="disconnectBtn" onclick="disconnectHardware()" style="display:none;">
            <i class="fa-solid fa-circle-xmark"></i> 中斷硬體連線
        </button>
        <button class="btn-simulate" id="simulateBtn" onclick="toggleSimulation()">
            <i class="fa-solid fa-wave-square"></i> 開啟動態數據模擬
        </button>
    </div>

    <!-- 📊 雙指標智能判定 Banner -->
    <div id="statusBanner" class="status-banner">
        🔄 系統就緒：請連接 ESP32-S 硬體或開啟動態模擬...
    </div>

    <!-- 主要資料看板群 -->
    <div class="dashboard-grid">
       
        <!-- 左側：3D 角度追蹤面板 -->
        <div class="card">
            <div class="card-title">
                <i class="fa-solid fa-bullseye" style="color:var(--danger)"></i>
                手腕旋轉目標角度
            </div>
            <div class="angle-large">45 <span style="font-size:20px;">°</span></div>
           
            <div class="data-row">
                <span>前後傾斜 (X 軸)：</span>
                <span id="txtX" style="font-weight:bold;">0 °</span>
            </div>
            <div class="data-row" style="border-bottom: 1px solid #1f2937; padding-bottom: 8px;">
                <span>左右翻轉 (Y 軸)：</span>
                <span id="txtY" style="font-weight:bold; color:var(--primary);">0 °</span>
            </div>

            <div class="card-title" style="margin-top:12px;">
                <i class="fa-solid fa-cube" style="color:var(--primary)"></i>
                水瓶實體姿態 3D 模擬
            </div>
            <div class="preview-box">
                <span class="direction-tag" style="top:8px; left:8px;">前</span>
                <span class="direction-tag" style="bottom:8px; right:8px;">後</span>
                <div class="bottle-container">
                    <div id="bottle3D" class="bottle-3d"></div>
                </div>
            </div>
        </div>

        <!-- 右側：Grove-EMG 肌電圖監測面板 -->
        <div class="card">
            <div class="card-title">
                <i class="fa-solid fa-bolt" style="color:var(--success)"></i>
                Grove - EMG 肌肉發力即時狀態
            </div>
           
            <div class="data-row" style="margin-top: 15px;">
                <span>感測器類比電壓：</span>
                <span id="emgVoltage" style="font-weight:bold; font-family:monospace; color:var(--success); font-size:20px;">1500 mV</span>
            </div>
            <div class="data-row">
                <span>相對肌肉發力率：</span>
