<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧復健水瓶 - 3D動態監測</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
h1 { text-align: center; color: #23395d; font-size: 1.8rem; margin-bottom: 5px; }
.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 0.95rem; }

.target-setter { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 25px; background: #eef2f7; padding: 15px; border-radius: 12px; font-weight: bold; color: #2c3e50; }
.target-setter input { width: 70px; padding: 8px; font-size: 1.1rem; border-radius: 6px; border: 1px solid #cbd5e1; text-align: center; }

.main-content { display: flex; flex-direction: column; gap: 20px; }
.top-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: stretch; }

.box-wrapper { display: flex; flex-direction: column; gap: 20px; width: 240px; }
.box { padding: 20px; border-radius: 12px; text-align: center; color: white; transition: all 0.3s ease; position: relative; }
.box-x { background: linear-gradient(135deg, #ff6b6b, #ee5253); }
.box-y { background: linear-gradient(135deg, #7f8c8d, #95a5a6); }

.box-y.achieved {
background: linear-gradient(135deg, #1dd1a1, #10ac84) !important;
animation: pulse 1s infinite alternate;
box-shadow: 0 0 20px rgba(29, 209, 161, 0.6);
}
@keyframes pulse {
0% { transform: scale(1); }
100% { transform: scale(1.03); }
}

.badge { display: none; background: #fff; color: #10ac84; padding: 3px 8px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; position: absolute; top: 10px; right: 10px; }
.box-y.achieved .badge { display: block; }
.title-text { font-size: 1rem; opacity: 0.9; display: block; margin-bottom: 8px; }
.value { font-size: 2.5rem; font-weight: bold; display: inline-block; }
.unit { font-size: 1.2rem; margin-left: 3px; }

/* ================= 升級：立體 3D 視覺化區域 ================= */
.visual-container { background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 280px; height: 260px; perspective: 800px; /* 增強 3D 縱深感 */ }
.visual-title { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; font-weight: bold; }

/* 3D 旋轉舞台容器 */
.bottle-stage { width: 60px; height: 130px; position: relative; transform-style: preserve-3d; transition: transform 0.1s ease-out; }

/* 定義 3D 立方體瓶子的 6 個面 */
.bottle-face { position: absolute; width: 60px; height: 130px; background: rgba(52, 152, 219, 0.85); border: 2px solid #2980b9; box-sizing: border-box; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 4px; }

/* 將六個面定位到各自的 3D 空間位置 (厚度設為 40px) */
.face-front { transform: rotateY( 0deg) translateZ(20px); background: linear-gradient(to bottom, #4fa7e6, #2980b9); }
.face-back { transform: rotateY(180deg) translateZ(20px); background: #2471a3; }
.face-left { transform: rotateY(-90deg) translateZ(20px); width: 40px; left: 10px; background: #21618c; }
.face-right { transform: rotateY( 90deg) translateZ(20px); width: 40px; left: 10px; background: #2e86c1; }
.face-top { transform: rotateX( 90deg) translateZ(20px); height: 40px; top: 45px; background: #5dade2; border-radius: 0; }
.face-bottom { transform: rotateX(-90deg) translateZ(110px); height: 40px; top: 45px; background: #1b4f72; }

/* 3D 瓶蓋 */
.cap-stage { width: 24px; height: 20px; position: absolute; top: -20px; left: 18px; transform-style: preserve-3d; }
.cap-face { position: absolute; width: 24px; height: 20px; background: rgba(241, 196, 15, 0.9); border: 1px solid #d4ac0d; box-sizing: border-box; }
.cap-front { transform: rotateY( 0deg) translateZ(10px); }
.cap-back { transform: rotateY(180deg) translateZ(10px); }
.cap-left { transform: rotateY(-90deg) translateZ(10px); width: 20px; left: 2px; background: #b7950b; }
.cap-right { transform: rotateY( 90deg) translateZ(10px); width: 20px; left: 2px; background: #f4d03f; }
.cap-top { transform: rotateX( 90deg) translateZ(10px); height: 20px; top: 0px; background: #f7dc6f; }
/* ======================================================== */

/* 折線圖控制按鈕 */
.toggle-btn-container { text-align: center; margin-top: 10px; }
.toggle-chart-btn { background-color: #23395d; color: white; border: none; padding: 12px 24px; font-size: 1rem; font-weight: bold; border-radius: 30px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-flex; align-items: center; gap: 8px; }
.toggle-chart-btn:hover { background-color: #172640; transform: translateY(-1px); }
.toggle-chart-btn:active { transform: translateY(1px); }

/* 圖表可摺疊區域 */
.collapsible-chart {
max-height: 0;
overflow: hidden;
transition: max-height 0.4s ease-out, opacity 0.3s ease-out;
opacity: 0;
background: #fafafa;
border-radius: 12px;
border: 0px solid #edf2f7;
margin-top: 0;
}
.collapsible-chart.show {
max-height: 460px;
opacity: 1;
border: 1px solid #edf2f7;
margin-top: 15px;
padding: 15px;
}
.chart-container { position: relative; height: 400px; width: 100%; }
</style>
</head>
<body>

<div class="container">
<h1>🍼 智慧復健水瓶 3D 角度監測系統</h1>
<div class="subtitle">患者手部即時關節活動度 (ROM) 追蹤後台</div>

<div class="target-setter">
🎯 今日手腕旋轉目標角度：
<input type="number" id="targetAngleInput" value="45" min="1" max="90"> 度 (°)
</div>

<div class="main-content">
<div class="top-row">
<div class="box-wrapper">
<div class="box box-x">
<span class="title-text">前後傾斜 (X 軸)</span>
<span id="valX" class="value">0</span><span class="unit">°</span>
</div>
<div class="box box-y" id="boxY">
<span class="badge">🎉 完美達標</span>
<span class="title-text">左右手腕翻轉 (Y 軸)</span>
<span id="valY" class="value">0</span><span class="unit">°</span>
</div>
</div>

<div class="visual-container">
<div class="visual-title">🔄 水瓶實體姿態 3D 模擬</div>
<div class="bottle-stage" id="bottleStage">
<div class="cap-stage">
<div class="cap-face cap-front"></div>
<div class="cap-face cap-back"></div>
<div class="cap-face cap-left"></div>
<div class="cap-face cap-right"></div>
<div class="cap-face cap-top"></div>
</div>
<div class="bottle-face face-front">前</div>
<div class="bottle-face face-back">後</div>
<div class="bottle-face face-left"></div>
<div class="bottle-face face-right"></div>
<div class="bottle-face face-top"></div>
<div class="bottle-face face-bottom"></div>
</div>
</div>
</div>

<div class="toggle-btn-container">
<button class="toggle-chart-btn" id="toggleChartBtn" onclick="toggleChartView()">
📊 展開即時趨勢圖表
</button>
</div>

<div class="collapsible-chart" id="chartSection">
<div class="chart-container">
<canvas id="rehabChart"></canvas>
</div>
</div>
</div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://rehab-bottle-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

function toggleChartView() {
const chartSection = document.getElementById('chartSection');
const btn = document.getElementById('toggleChartBtn');

if (chartSection.classList.contains('show')) {
chartSection.classList.remove('show');
btn.innerHTML = '📊 展開即時趨勢圖表';
} else {
chartSection.classList.add('show');
btn.innerHTML = '🔽 隱藏即時趨勢圖表';
setTimeout(() => { rehabChart.resize(); }, 100);
}
}

const ctx = document.getElementById('rehabChart').getContext('2d');
const maxDataPoints = 40;

const rehabChart = new Chart(ctx, {
type: 'line',
data: {
labels: [],
datasets: [
{ label: '前後傾斜角度 (X 軸)', borderColor: '#ee5253', backgroundColor: 'rgba(238,82,83,0.1)', data: [], fill: false, tension: 0.4, borderWidth: 3 },
{ label: '手腕旋轉角度 (Y 軸)', borderColor: '#10ac84', backgroundColor: 'rgba(16,172,132,0.1)', data: [], fill: false, tension: 0.4, borderWidth: 3 }
]
},
options: {
responsive: true,
maintainAspectRatio: false,
plugins: { legend: { position: 'top' } },
scales: {
y: { min: -90, max: 90, title: { display: true, text: '活動角度 (度數 °)' } }
}
}
});

database.ref('/rehab_bottle').on('value', (snapshot) => {
const data = snapshot.val();
if (data) {
const x = data.angle_X;
const y = data.angle_Y;

document.getElementById('valX').innerText = x;
document.getElementById('valY').innerText = y;

// 立體 3D 控制：
// rotateX 控制前後仰角 (X 軸數據)
// rotateY 控制左右旋轉 (Y 軸數據)
// 為了讓使用者更好辨識正面，額外帶一點點初始角度調整
const bottleStage = document.getElementById('bottleStage');
bottleStage.style.transform = `rotateX(${-x}deg) rotateY(${y}deg) rotateZ(0deg)`;

const currentTarget = parseInt(document.getElementById('targetAngleInput').value) || 45;
const boxYElement = document.getElementById('boxY');

if (Math.abs(y) >= currentTarget) {
boxYElement.classList.add('achieved');
} else {
boxYElement.classList.remove('achieved');
}

const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

if (rehabChart.data.labels.length >= maxDataPoints) {
rehabChart.data.labels.shift();
rehabChart.data.datasets[0].data.shift();
rehabChart.data.datasets[1].data.shift();
}

rehabChart.data.labels.push(now);
rehabChart.data.datasets[0].data.push(x);
rehabChart.data.datasets[1].data.push(y);

rehabChart.update('none');
}
});
</script>

</body>
</html>
